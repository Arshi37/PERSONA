<!-- Picker Wheel Section for namesyler.site -->
<section id="picker-wheel-tool" class="picker-wheel-section">
    <div class="picker-container">
        <div class="picker-header">
            <h2><i class="fas fa-circle-notch"></i> Random Decision Maker</h2>
            <p>Can't decide? Let our picker wheel help you make random choices!</p>
        </div>

        <div class="picker-content">
            <div class="wheel-area">
                <div class="wheel-wrapper">
                    <canvas id="pickerWheelCanvas" width="300" height="300"></canvas>
                    <div class="wheel-pointer">
                        <i class="fas fa-caret-down"></i>
                    </div>
                    <button id="pickerSpinBtn" class="picker-spin-button">
                        <i class="fas fa-play"></i>
                        SPIN
                    </button>
                </div>
                
                <div class="picker-result" id="pickerResult">
                    <div class="result-content">
                        <h4>Result:</h4>
                        <div class="result-text" id="pickerResultText">Add items and spin!</div>
                    </div>
                </div>
            </div>

            <div class="picker-controls">
                <div class="input-area">
                    <h4><i class="fas fa-list"></i> Add Options</h4>
                    <div class="add-option">
                        <input type="text" id="pickerItemInput" placeholder="Enter an option..." maxlength="30">
                        <button id="pickerAddBtn"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    
                    <div class="options-list" id="pickerItemsList">
                        <!-- Items will be dynamically added here -->
                    </div>
                    
                    <div class="list-actions">
                        <button id="pickerClearBtn" class="clear-all-btn">
                            <i class="fas fa-trash"></i> Clear All
                        </button>
                        <button id="pickerDefaultBtn" class="load-default-btn">
                            <i class="fas fa-refresh"></i> Examples
                        </button>
                    </div>
                </div>

                <div class="quick-actions">
                    <button id="pickerSoundToggle" class="toggle-btn sound-enabled">
                        <i class="fas fa-volume-up"></i> Sound
                    </button>
                    <button id="pickerFullscreenBtn" class="action-btn">
                        <i class="fas fa-expand"></i> Full Tool
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="picker-confetti" id="pickerConfetti"></div>
</section>

<!-- JavaScript for the embedded picker wheel -->
<script>
class EmbeddedPickerWheel {
    constructor() {
        this.canvas = document.getElementById('pickerWheelCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.centerX = this.canvas.width / 2;
        this.centerY = this.canvas.height / 2;
        this.radius = 135;
        
        this.items = [];
        this.isSpinning = false;
        this.currentRotation = 0;
        this.targetRotation = 0;
        this.animationId = null;
        this.soundEnabled = true;
        
        this.colors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
            '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'
        ];
        
        this.defaultItems = [
            'Yes', 'No', 'Maybe', 'Ask Again', 'Definitely', 'Not Now'
        ];
        
        this.initializeElements();
        this.attachEventListeners();
        this.loadDefaultItems();
        this.drawWheel();
    }
    
    initializeElements() {
        this.itemInput = document.getElementById('pickerItemInput');
        this.addBtn = document.getElementById('pickerAddBtn');
        this.itemsList = document.getElementById('pickerItemsList');
        this.spinBtn = document.getElementById('pickerSpinBtn');
        this.clearBtn = document.getElementById('pickerClearBtn');
        this.defaultBtn = document.getElementById('pickerDefaultBtn');
        this.resultDisplay = document.getElementById('pickerResult');
        this.resultText = document.getElementById('pickerResultText');
        this.soundToggle = document.getElementById('pickerSoundToggle');
        this.fullscreenBtn = document.getElementById('pickerFullscreenBtn');
        this.confettiContainer = document.getElementById('pickerConfetti');
    }
    
    attachEventListeners() {
        this.addBtn.addEventListener('click', () => this.addItem());
        this.itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.addItem();
        });
        this.spinBtn.addEventListener('click', () => this.spin());
        this.clearBtn.addEventListener('click', () => this.clearItems());
        this.defaultBtn.addEventListener('click', () => this.loadDefaultItems());
        this.soundToggle.addEventListener('click', () => this.toggleSound());
        this.fullscreenBtn.addEventListener('click', () => this.openFullTool());
    }
    
    addItem() {
        const text = this.itemInput.value.trim();
        if (text && !this.items.some(item => item.text === text)) {
            const item = {
                text: text,
                color: this.colors[this.items.length % this.colors.length],
                id: Date.now()
            };
            this.items.push(item);
            this.itemInput.value = '';
            this.updateItemsList();
            this.drawWheel();
        }
    }
    
    removeItem(id) {
        this.items = this.items.filter(item => item.id !== id);
        this.updateItemsList();
        this.drawWheel();
    }
    
    clearItems() {
        this.items = [];
        this.updateItemsList();
        this.drawWheel();
        this.resultDisplay.classList.remove('show');
    }
    
    loadDefaultItems() {
        this.items = this.defaultItems.map((text, index) => ({
            text: text,
            color: this.colors[index % this.colors.length],
            id: Date.now() + index
        }));
        this.updateItemsList();
        this.drawWheel();
    }
    
    updateItemsList() {
        this.itemsList.innerHTML = '';
        this.items.forEach(item => {
            const itemElement = document.createElement('div');
            itemElement.className = 'picker-item';
            itemElement.innerHTML = `
                <div class="picker-item-color" style="background-color: ${item.color}"></div>
                <span class="picker-item-text">${item.text}</span>
                <button class="picker-delete-btn" onclick="embeddedWheel.removeItem(${item.id})">
                    <i class="fas fa-times"></i>
                </button>
            `;
            this.itemsList.appendChild(itemElement);
        });
    }
    
    drawWheel() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        if (this.items.length === 0) {
            this.drawEmptyWheel();
            return;
        }
        
        const angleStep = (2 * Math.PI) / this.items.length;
        
        this.items.forEach((item, index) => {
            const startAngle = index * angleStep + this.currentRotation;
            const endAngle = (index + 1) * angleStep + this.currentRotation;
            
            // Draw sector
            this.ctx.beginPath();
            this.ctx.moveTo(this.centerX, this.centerY);
            this.ctx.arc(this.centerX, this.centerY, this.radius, startAngle, endAngle);
            this.ctx.closePath();
            this.ctx.fillStyle = item.color;
            this.ctx.fill();
            
            // Draw border
            this.ctx.beginPath();
            this.ctx.moveTo(this.centerX, this.centerY);
            this.ctx.arc(this.centerX, this.centerY, this.radius, startAngle, endAngle);
            this.ctx.closePath();
            this.ctx.strokeStyle = '#fff';
            this.ctx.lineWidth = 2;
            this.ctx.stroke();
            
            // Draw text
            const textAngle = startAngle + angleStep / 2;
            const textRadius = this.radius * 0.7;
            const textX = this.centerX + Math.cos(textAngle) * textRadius;
            const textY = this.centerY + Math.sin(textAngle) * textRadius;
            
            this.ctx.save();
            this.ctx.translate(textX, textY);
            this.ctx.rotate(textAngle + Math.PI / 2);
            this.ctx.fillStyle = '#fff';
            this.ctx.font = 'bold 12px Arial';
            this.ctx.textAlign = 'center';
            this.ctx.textBaseline = 'middle';
            this.ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            this.ctx.shadowBlur = 1;
            this.ctx.fillText(item.text, 0, 0);
            this.ctx.restore();
        });
        
        // Draw center circle
        this.ctx.beginPath();
        this.ctx.arc(this.centerX, this.centerY, 25, 0, 2 * Math.PI);
        this.ctx.fillStyle = '#2c3e50';
        this.ctx.fill();
        this.ctx.strokeStyle = '#fff';
        this.ctx.lineWidth = 3;
        this.ctx.stroke();
    }
    
    drawEmptyWheel() {
        this.ctx.beginPath();
        this.ctx.arc(this.centerX, this.centerY, this.radius, 0, 2 * Math.PI);
        this.ctx.fillStyle = '#ecf0f1';
        this.ctx.fill();
        this.ctx.strokeStyle = '#bdc3c7';
        this.ctx.lineWidth = 2;
        this.ctx.stroke();
        
        this.ctx.fillStyle = '#7f8c8d';
        this.ctx.font = 'bold 16px Arial';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText('Add options!', this.centerX, this.centerY);
    }
    
    spin() {
        if (this.isSpinning || this.items.length === 0) return;
        
        this.isSpinning = true;
        this.spinBtn.disabled = true;
        this.spinBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SPINNING';
        
        if (this.soundEnabled) this.playSpinSound();
        
        const spins = 3 + Math.random() * 3;
        const finalAngle = Math.random() * 2 * Math.PI;
        this.targetRotation = this.currentRotation + spins * 2 * Math.PI + finalAngle;
        
        const startTime = Date.now();
        const duration = 2500;
        const startRotation = this.currentRotation;
        
        const animate = () => {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            
            this.currentRotation = startRotation + (this.targetRotation - startRotation) * easeOut;
            this.drawWheel();
            
            if (progress < 1) {
                this.animationId = requestAnimationFrame(animate);
            } else {
                this.finishSpin();
            }
        };
        
        this.animationId = requestAnimationFrame(animate);
    }
    
    finishSpin() {
        this.isSpinning = false;
        this.spinBtn.disabled = false;
        this.spinBtn.innerHTML = '<i class="fas fa-play"></i> SPIN';
        
        const normalizedRotation = this.currentRotation % (2 * Math.PI);
        const angleStep = (2 * Math.PI) / this.items.length;
        const pointerAngle = (3 * Math.PI / 2) - normalizedRotation;
        let winnerIndex = Math.floor(((pointerAngle % (2 * Math.PI)) + (2 * Math.PI)) % (2 * Math.PI) / angleStep);
        winnerIndex = (this.items.length - winnerIndex - 1) % this.items.length;
        
        const winner = this.items[winnerIndex];
        this.showResult(winner);
        this.createConfetti();
        if (this.soundEnabled) this.playWinSound();
    }
    
    showResult(winner) {
        this.resultText.textContent = winner.text;
        this.resultText.style.borderLeftColor = winner.color;
        this.resultDisplay.classList.add('show');
        
        setTimeout(() => {
            this.resultText.classList.add('bounce');
            setTimeout(() => this.resultText.classList.remove('bounce'), 800);
        }, 100);
    }
    
    createConfetti() {
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
        
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                
                this.confettiContainer.appendChild(confetti);
                
                setTimeout(() => {
                    if (confetti.parentNode) confetti.parentNode.removeChild(confetti);
                }, 3000);
            }, i * 20);
        }
    }
    
    playSpinSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.4);
        } catch (e) {
            console.log('Audio not supported');
        }
    }
    
    playWinSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523, audioContext.currentTime);
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {
            console.log('Audio not supported');
        }
    }
    
    toggleSound() {
        this.soundEnabled = !this.soundEnabled;
        this.soundToggle.classList.toggle('sound-enabled', this.soundEnabled);
        this.soundToggle.classList.toggle('sound-disabled', !this.soundEnabled);
        this.soundToggle.innerHTML = this.soundEnabled ? 
            '<i class="fas fa-volume-up"></i> Sound' : 
            '<i class="fas fa-volume-mute"></i> Sound';
    }
    
    openFullTool() {
        // You can link this to a dedicated page with the full picker wheel
        window.open('/picker-wheel.html', '_blank');
    }
}

// Initialize the embedded wheel
document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('pickerWheelCanvas')) {
        window.embeddedWheel = new EmbeddedPickerWheel();
    }
});
</script>
